<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1ms Unicode Streamer</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: #1e1e1e;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h1 { margin-top: 0; color: #fff; font-size: 20px; }
        .stat-box {
            background: #2a2a2a;
            padding: 16px;
            border-radius: 8px;
            font-size: 24px;
            font-family: monospace;
            color: #00ff66;
            text-align: center;
            margin: 20px 0;
            border: 1px solid #444;
        }
        .preview {
            background: #000;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 11px;
            height: 80px;
            overflow: hidden;
            white-space: pre-wrap;
            color: #888;
            border: 1px solid #222;
        }
        .status-text { color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>High-Frequency Unicode Stream</h1>
        <p class="status-text">Background execution loop calibrated precisely to 1 iteration per millisecond.</p>
        
        <div class="stat-box" id="counter">0 blocks processed</div>
        <div class="status-text" style="margin-bottom: 8px;">Latest stream sample text:</div>
        <div class="preview" id="preview">Generating Unicode table...</div>
    </div>

    <!-- Background worker thread handles the 1ms timing loops precisely -->
    <script id="worker-script" type="application/javascript">
        self.onmessage = function() {
            let chars = [];
            // Collect full visible range
            for (let i = 33; i < 0x2FFFF; i++) {
                if (i >= 0x7F && i <= 0x9F) continue;
                if (i >= 0xD800 && i <= 0xDFFF) continue;
                chars.push(String.fromCodePoint(i));
            }
            const unicodeBlock = chars.join('');
            
            const targetInterval = 1.0; // Fixed to exactly 1 millisecond
            let nextTime = performance.now();
            let totalOutputs = 0;

            function runLoop() {
                let currentTime = performance.now();
                let batchCount = 0;

                // Execute iterations if processing gaps open up
                while (currentTime >= nextTime && batchCount < 10) {
                    totalOutputs++;
                    nextTime += targetInterval;
                    batchCount++;
                }

                // Smooth execution tracking sent to browser thread
                if (totalOutputs % 25 === 0) {
                    self.postMessage({ count: totalOutputs, sample: unicodeBlock.slice(0, 200) });
                }

                setTimeout(runLoop, 0);
            }
            runLoop();
        };
    </script>

    <script>
        const counterEl = document.getElementById('counter');
        const previewEl = document.getElementById('preview');

        const blob = new Blob([document.getElementById('worker-script').textContent], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));

        worker.onmessage = function(e) {
            counterEl.textContent = e.data.count.toLocaleString() + " blocks processed";
            previewEl.textContent = e.data.sample + "... [Truncated]";
        };

        worker.postMessage("start");
    </script>
</body>
</html>
